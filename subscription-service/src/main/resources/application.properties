spring.application.name=subscription-service

server.port=8087

spring.datasource.url=${SUBSCRIPTION_DB_URL}
spring.datasource.username=${SUBSCRIPTION_DB_USER}
spring.datasource.password=${SUBSCRIPTION_DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true

management.server.port=8087
management.endpoints.web.exposure.include=*
management.endpoint.prometheus.access=read_only
management.prometheus.metrics.export.enabled=true

management.tracing.export.enabled=true
management.tracing.sampling.probability=1.0

management.opentelemetry.tracing.export.otlp.endpoint=http://alloy:4318/v1/traces

user.tracker-service.url=${TRACKER_SERVICE_URL}

jdbc.includes=query