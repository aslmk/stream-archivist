<div class="flex flex-row bg-slate-700 w-[260px] rounded-xl relative overflow-hidden">
  <!-- streamer profile image -->
  <div class="flex justify-center">
    <img
      [src]="streamer.streamerProfileImageUrl | imgUrl"
      class="w-16 h-16 rounded-full my-2 ml-2 mr-4 flex-shrink-0" alt="Streamer profile image">
  </div>

  <div class="flex flex-col mt-2 min-w-0">
    <h2 class="text-white font-medium truncate"
        [title]="streamer.streamerUsername">
      {{ streamer.streamerUsername }}
    </h2>

    <!-- Recording status -->
    <div class="flex mt-1 items-center">
      <div class="rounded-full w-2 h-2 mr-1" [ngClass]="dotState"></div>
      <span class="text-xs" [ngClass]="textState">{{ streamer.recordingStatus }}</span>
    </div>
  </div>

  <!-- Twitch icon -->
  @if (streamer.providerName == 'twitch') {
    <img [src]="twitchIconUrl" class="w-4 h-4 absolute top-3.5 right-8" alt="Twitch icon">
  }

  <!-- Actions -->
  <div class="absolute top-1 right-1">
    <div class="relative" #menuRoot>
      <button
        (click)="toggleMenu()"
        class="text-white hover:bg-slate-600 rounded-full p-1 transition">
        ⋮
      </button>

      @if (menuOpen) {
        <div class="absolute right-0 mt-1 bg-slate-800 rounded-md shadow-lg z-10">
          <button
            (click)="onUnsubscribe(streamer.streamerId)"
            class="block px-4 py-2 text-sm text-white hover:bg-red-600 w-full text-left">
            Unsubscribe
          </button>
        </div>
      }
    </div>
  </div>

  <!-- The ribbon -->
  <div class="absolute px-10 -rotate-[30deg] bottom-2 -right-5"
       [ngClass]="{'bg-green-500': streamer.live, 'bg-red-600' : !streamer.live }">
    <span class="text-xs font-semibold text-white block">{{ streamer.live ? 'LIVE' : 'OFFLINE' }}</span>
  </div>
</div>
