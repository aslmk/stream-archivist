spring.application.name=uploading-worker

server.port=8086

spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}

user.rabbitmq.queue.name=${RABBITMQ_QUEUE_UPLOADING}
user.rabbitmq.listener.concurrency=${RABBITMQ_UPLOADING_LISTENER_CONCURRENCY}

user.storage-service-url=${STORAGE_SERVICE_URL}

user.file.part-size=50
user.storage.recordings.path=${RECORDING_STORAGE_PATH:common/recordings}

management.server.port=8086
management.endpoints.web.exposure.include=*
management.endpoint.prometheus.access=read_only
management.prometheus.metrics.export.enabled=true

management.tracing.enabled=true
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://alloy:4318/v1/traces
management.otlp.tracing.transport=http