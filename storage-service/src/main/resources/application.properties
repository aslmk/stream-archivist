spring.application.name=storage-service

server.port=8083

minio.user=${MINIO_USERNAME}
minio.password=${MINIO_PASSWORD}
minio.endpoint=${MINIO_ENDPOINT}
minio.bucketName=${MINIO_BUCKET}
minio.public-endpoint=${MINIO_PUBLIC_ENDPOINT}

# Number of already-uploaded S3 parts to fetch and process per batch.
# Mapped to the 'max-parts' parameter in ListParts requests.
# Max allowed by S3 is 1000.
user.storage.batch.max-size=100

spring.datasource.url=${STORAGE_DB_URL}
spring.datasource.username=${STORAGE_DB_USER}
spring.datasource.password=${STORAGE_DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true

management.server.port=8083
management.endpoints.web.exposure.include=*
management.endpoint.prometheus.access=read_only
management.prometheus.metrics.export.enabled=true

management.tracing.enabled=true
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://alloy:4318/v1/traces
management.otlp.tracing.transport=http

user.orchestrator.base-url=${RECORDING_ORCHESTRATOR_URL}