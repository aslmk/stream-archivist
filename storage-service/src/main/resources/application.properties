spring.application.name=storage-service

server.port=8083

minio.user=${MINIO_USERNAME}
minio.password=${MINIO_PASSWORD}
minio.endpoint=${MINIO_ENDPOINT}
minio.bucketName=${MINIO_BUCKET}

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
user.kafka.topic=${KAFKA_TOPIC_UPLOADING_LIFECYCLE:default-kafka-topic}
user.kafka.group-id=${STORAGE_KAFKA_GROUP_ID:default-kafka-group}

spring.datasource.url=${STORAGE_DB_URL}
spring.datasource.username=${STORAGE_DB_USER}
spring.datasource.password=${STORAGE_DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true

management.server.port=8083
management.endpoints.web.exposure.include=*
management.endpoint.prometheus.access=read_only
management.prometheus.metrics.export.enabled=true

management.tracing.enabled=true
management.tracing.sampling.probability=1.0

otel.service.name=storage-service
otel.traces.exporter=otlp
otel.metrics.exporter=none
otel.logs.exporter=none
otel.exporter.otlp.endpoint=http://alloy:4318
otel.exporter.otlp.protocol=http/protobuf