spring.application.name=stream-status-service

server.port=8088

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

user.kafka.topic-stream-lifecycle-events=${KAFKA_TOPIC_STREAM_LIFECYCLE:default-kafka-topic}
user.kafka.topic-recording-status-updated-events=${KAFKA_TOPIC_RECORDING_STATUS_UPDATED:default-kafka-topic}
user.kafka.group-id=${STREAM_STATUS_KAFKA_GROUP_ID:default-group-id}

user.subscription-service.url=${SUBSCRIPTION_SERVICE_URL:localhost:8087}

management.server.port=8088
management.endpoints.web.exposure.include=*
management.endpoint.prometheus.access=read_only
management.prometheus.metrics.export.enabled=true
management.otlp.metrics.export.url=http://alloy:4318/v1/metrics

management.tracing.export.enabled=true
management.tracing.sampling.probability=1.0

management.opentelemetry.tracing.export.otlp.endpoint=http://alloy:4318/v1/traces