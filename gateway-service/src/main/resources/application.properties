spring.application.name=gateway-service

server.port=8080

spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWK_URL:http://localhost:8081/.well-known/jwks.json}
user.jwt.cookie-name=${JWT_ACCESS_TOKEN_COOKIE_NAME:JWT_ACCESS_TOKEN}

spring.cloud.gateway.server.webflux.routes[0].id=auth-service-api
spring.cloud.gateway.server.webflux.routes[0].uri=${AUTH_SERVICE_URL:http://localhost:8081}
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.server.webflux.routes[1].id=auth-service-oauth2
spring.cloud.gateway.server.webflux.routes[1].uri=${AUTH_SERVICE_URL:http://localhost:8081}
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/oauth2/**, /login/**

spring.cloud.gateway.server.webflux.routes[2].id=subscription-service-api
spring.cloud.gateway.server.webflux.routes[2].uri=${SUBSCRIPTION_SERVICE_URL:http://localhost:8087}
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/subscriptions

spring.cloud.gateway.server.webflux.routes[3].id=stream-status-service-api
spring.cloud.gateway.server.webflux.routes[3].uri=${STREAM_STATUS_SERVICE_URL:http://localhost:8088}
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/sse/stream-status

management.server.port=8080
management.endpoints.web.exposure.include=*
management.endpoint.prometheus.access=read_only
management.prometheus.metrics.export.enabled=true

management.tracing.enabled=true
management.tracing.sampling.probability=1.0

otel.service.name=gateway-service
otel.traces.exporter=otlp
otel.metrics.exporter=none
otel.logs.exporter=none
otel.exporter.otlp.endpoint=http://alloy:4318
otel.exporter.otlp.protocol=http/protobuf