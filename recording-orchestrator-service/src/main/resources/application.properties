spring.application.name=recording-orchestrator-service

server.port=8084

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

user.kafka.stream-lifecycle-topic=${KAFKA_TOPIC_STREAM_LIFECYCLE:default-kafka-topic}
user.kafka.recording-lifecycle-topic=${KAFKA_TOPIC_RECORDING_LIFECYCLE:default-kafka-topic}
user.kafka.group-id=${RECORDING_ORCHESTRATOR_KAFKA_GROUP_ID:default-group-id}

spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}

user.rabbitmq.recording-queue.name=${RABBITMQ_QUEUE_RECORDING:default-rabbitmq-queue}
user.rabbitmq.uploading-queue.name=${RABBITMQ_QUEUE_UPLOADING:default-rabbitmq-queue}

management.server.port=8084
management.endpoints.web.exposure.include=*
management.endpoint.prometheus.access=read_only
management.prometheus.metrics.export.enabled=true

management.tracing.enabled=true
management.tracing.sampling.probability=1.0

otel.service.name=recording-orchestrator-service
otel.traces.exporter=otlp
otel.metrics.exporter=none
otel.logs.exporter=none
otel.exporter.otlp.endpoint=http://alloy:4318
otel.exporter.otlp.protocol=http/protobuf