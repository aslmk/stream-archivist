spring.application.name=archive-service
server.port=8089

user.orchestrator.base-url=${RECORDING_ORCHESTRATOR_URL}
user.storage.base-url=${STORAGE_SERVICE_URL}

management.server.port=8089
management.endpoints.web.exposure.include=*
management.endpoint.prometheus.access=read_only
management.prometheus.metrics.export.enabled=true

management.tracing.enabled=true
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://alloy:4318/v1/traces
management.otlp.tracing.transport=http
